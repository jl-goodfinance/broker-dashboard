name: 每日自動更新數據

on:
  schedule:
    - cron: "45 10 * * *"   # UTC 10:45 = 台北 18:45（收盤後）
  workflow_dispatch:          # 也可在 GitHub 頁面手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 跑 update.py（抓 TWSE + FinMind）
        run: python3 update.py

      - name: 提交更新後的數據
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          git diff --cached --quiet || git commit -m "auto: 每日數據更新 $(date -u +%Y-%m-%d)"
          git push
